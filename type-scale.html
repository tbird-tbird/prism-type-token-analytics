<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
<title>Type Scale</title>
<style>
  :root { --bg: #fff; --border: #e5e5e5; --text: #1a1a1a; --muted: #6b7280; --accent: #2563eb; }
  [data-theme="dark"] { --bg: #0f0f0f; --border: #2a2a2a; --text: #e5e5e5; --muted: #888; --accent: #60a5fa; }
  [data-theme="dark"] .nav-dropdown-menu { background: #1a1a1a; box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
  [data-theme="dark"] .nav-dropdown-menu a:hover { background: #222; }
  [data-theme="dark"] td { border-bottom-color: #1e1e1e; }
  [data-theme="dark"] tr:hover td { background: #161616; }
  [data-theme="dark"] code { background: #1e1e1e; color: #ccc; }
  [data-theme="dark"] .note { background: #191400; border-left-color: #b45309; }
  [data-theme="dark"] .mode-tag { background: #1e1e1e; }
  [data-theme="dark"] .bar { background: #333; }
  [data-theme="dark"] .tier-1 { background: #1c0606; }
  [data-theme="dark"] .tier-2 { background: #191400; }
  [data-theme="dark"] .stat-card { background: #141414; border-color: var(--border); }
  [data-theme="dark"] .scale-toggle button { background: transparent; }
  [data-theme="dark"] .scale-toggle button.active, [data-theme="dark"] .scale-toggle button.active:hover { background: #e5e5e5; color: #0f0f0f; }
  [data-theme="dark"] .scale-toggle button:hover { background: #1a1a1a; }
  [data-theme="dark"] .scale-item { border-bottom-color: #1e1e1e; }
  [data-theme="dark"] .scale-item:hover { background: #161616; }
  [data-theme="dark"] .scale-flag { background: #2a0808; border-color: #7f1d1d; color: #f87171; }
  [data-theme="dark"] .scale-px.flagged { color: #f87171; }
  .theme-toggle { margin-left: auto; display: inline-flex; border: 1px solid var(--border); border-radius: 999px; padding: 3px; }
  .theme-toggle button { padding: 6px 16px; font-size: 13px; font-weight: 500; font-family: inherit; border: none; background: transparent; color: var(--muted); cursor: pointer; border-radius: 999px; transition: all 0.2s ease; }
  .theme-toggle button.active { background: var(--text); color: var(--bg); }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
  .container { max-width: 1100px; margin: 0 auto; padding: 0 24px 48px; }
  nav.top-nav { border-bottom: 1px solid var(--border); margin-bottom: 40px; padding: 14px 0; display: flex; align-items: baseline; gap: 24px; font-size: 13px; position: relative; }
  nav.top-nav a { color: var(--muted); text-decoration: none; font-weight: 500; }
  nav.top-nav a:hover { color: var(--text); }
  nav.top-nav a.current { color: var(--text); }
  .nav-dropdown { position: relative; }
  .nav-dropdown-toggle { color: var(--muted); font-weight: 500; font-size: 13px; cursor: pointer; user-select: none; display: flex; align-items: center; gap: 4px; background: none; border: none; font-family: inherit; padding: 0; }
  .nav-dropdown-toggle:hover { color: var(--text); }
  .nav-dropdown-toggle.current { color: var(--text); }
  .nav-dropdown-toggle .caret { font-size: 10px; transition: transform 0.15s ease; }
  .nav-dropdown.open .caret { transform: rotate(180deg); }
  .nav-dropdown-menu { display: none; position: absolute; top: calc(100% + 8px); left: 0; background: #fff; border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,0.12); min-width: 160px; padding: 6px 0; z-index: 100; }
  .nav-dropdown.open .nav-dropdown-menu { display: block; }
  .nav-dropdown-menu a { display: block; padding: 8px 16px; color: var(--text); font-size: 14px; font-weight: 400; }
  .nav-dropdown-menu a:hover { background: #f9fafb; }
  h1 { font-size: 28px; font-weight: 700; margin-bottom: 6px; }
  .subtitle { font-size: 14px; color: var(--muted); margin-bottom: 32px; }

  .toggle-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
  .scale-toggle { display: inline-flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .scale-toggle button { padding: 10px 20px; font-size: 13px; font-weight: 500; font-family: inherit; border: none; background: #fff; color: var(--muted); cursor: pointer; transition: all 0.15s ease; border-right: 1px solid var(--border); }
  .scale-toggle button:last-child { border-right: none; }
  .scale-toggle button:hover { background: #f9fafb; color: var(--text); }
  .scale-toggle button.active, .scale-toggle button.active:hover { background: var(--text); color: #fff; }

  .scale-info { display: flex; gap: 24px; margin-bottom: 28px; font-size: 13px; color: var(--muted); }
  .scale-info .count { font-weight: 600; color: var(--text); }

  .scale-list { list-style: none; }
  .scale-item { display: flex; align-items: center; gap: 24px; padding: 16px 0; border-bottom: 1px solid #f3f4f6; transition: all 0.3s ease; }
  .scale-item:last-child { border-bottom: none; }
  .scale-item:hover { background: #fafbfc; margin: 0 -16px; padding-left: 16px; padding-right: 16px; border-radius: 8px; }
  .scale-meta { flex-shrink: 0; width: 80px; text-align: right; }
  .scale-px { font-size: 13px; font-weight: 400; color: var(--muted); font-family: 'SF Mono', 'Fira Code', monospace; }
  .scale-specimen { flex: 1; line-height: 1.2; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 400; transition: font-size 0.3s ease; font-family: 'SF Pro', 'SF Pro Display', -apple-system, system-ui, sans-serif; }
  .scale-flag { display: inline-block; font-size: 11px; font-weight: 500; color: #dc2626; background: #fef2f2; border: 1px solid #fecaca; border-radius: 4px; padding: 2px 8px; margin-left: 12px; vertical-align: middle; }
  .scale-px.flagged { color: #dc2626; }
  .scale-section { padding: 20px 0 8px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); border-bottom: 1px solid var(--border); }
  .scale-section:first-child { padding-top: 0; }
</style>
<script>(function(){var t=localStorage.getItem("prism-theme")||"light";document.documentElement.setAttribute("data-theme",t)})()</script>
</head>
<body>
<div class="container">

<nav class="top-nav">
  <div class="nav-dropdown" id="tokensDropdown">
    <button class="nav-dropdown-toggle" onclick="toggleDropdown('tokensDropdown')">Token Inventory <span class="caret">&#9662;</span></button>
    <div class="nav-dropdown-menu">
      <a href="tokens-base.html">Base Tokens</a>
      <a href="tokens-usage.html">Usage Tokens</a>
    </div>
  </div>
  <div class="nav-dropdown" id="analyticsDropdown">
    <button class="nav-dropdown-toggle" onclick="toggleDropdown('analyticsDropdown')">Type Analytics <span class="caret">&#9662;</span></button>
    <div class="nav-dropdown-menu">
      <a href="index.html">Base Tokens</a>
      <a href="usage-tokens.html">Usage Tokens</a>
    </div>
  </div>
  <a href="token-proposal.html">Token Proposal</a>
  <a href="type-scale.html" class="current">Type Scale</a>
  <a href="type-styles.html">Type Styles</a>
  <div class="theme-toggle">
    <button data-theme="light">Light</button>
    <button data-theme="dark">Dark</button>
  </div>
</nav>

<h1>Type Scale</h1>
<p class="subtitle">Desired type scale from each surface</p>

<div class="toggle-row">
  <div class="scale-toggle" id="scaleToggle">
    <button class="active" data-scale="foundation">Foundation</button>
    <button data-scale="consumer">Consumer</button>
    <button data-scale="courier">Courier+</button>
  </div>
  <div class="scale-toggle" id="fontToggle">
    <button class="active" data-font="sfpro">SF Pro</button>
    <button data-font="inter">Inter</button>
  </div>
</div>

<div class="scale-info" id="scaleInfo">
  <span><span class="count" id="stepCount">12</span> steps</span>
  <span>Range: <span class="count" id="scaleRange">12px – 72px</span></span>
</div>

<ul class="scale-list" id="scaleList"></ul>

</div>
<script>
var scales = {
  foundation: [72, 60, 48, 40, 32, 28, 24, 20, 18, 16, 14, 12],
  consumer: [40, 32, 24, 20, 16, 14, 12],
  courier: [40, 28, 22, 18, 16],
};

var sectionBreaks = {
  consumer: { displayAbove: 16, bodyAtOrBelow: 16 },
  courier:  { displayAbove: 18, bodyAtOrBelow: 18 }
};

var foundationSet = {};
scales.foundation.forEach(function(s) { foundationSet[s] = true; });

var fontMap = {
  sfpro: "'SF Pro', 'SF Pro Display', -apple-system, system-ui, sans-serif",
  inter: "'Inter', sans-serif"
};
var currentFont = 'sfpro';

function renderScale(name) {
  var sizes = scales[name];
  var list = document.getElementById('scaleList');
  document.getElementById('stepCount').textContent = sizes.length;
  document.getElementById('scaleRange').textContent = sizes[sizes.length - 1] + 'px \u2013 ' + sizes[0] + 'px';

  list.innerHTML = '';
  var breaks = sectionBreaks[name];
  var addedDisplay = false;
  var addedBody = false;

  sizes.forEach(function(px) {
    if (breaks) {
      if (!addedDisplay && px > breaks.bodyAtOrBelow) {
        var hdr = document.createElement('li');
        hdr.className = 'scale-section';
        hdr.textContent = 'Display';
        list.appendChild(hdr);
        addedDisplay = true;
      }
      if (!addedBody && px <= breaks.bodyAtOrBelow) {
        var hdr = document.createElement('li');
        hdr.className = 'scale-section';
        hdr.textContent = 'Body';
        list.appendChild(hdr);
        addedBody = true;
      }
    }
    var li = document.createElement('li');
    li.className = 'scale-item';
    var notInFoundation = name !== 'foundation' && !foundationSet[px];
    li.innerHTML =
      '<div class="scale-meta"><span class="scale-px' + (notInFoundation ? ' flagged' : '') + '">' + px + 'px</span></div>' +
      '<div class="scale-specimen" style="font-size:' + px + 'px;font-family:' + fontMap[currentFont] + '">The quick brown fox' +
      (notInFoundation ? '<span class="scale-flag">Not in Foundation scale</span>' : '') +
      '</div>';
    list.appendChild(li);
  });
}

document.getElementById('scaleToggle').addEventListener('click', function(e) {
  var btn = e.target.closest('button');
  if (!btn) return;
  this.querySelectorAll('button').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  renderScale(btn.dataset.scale);
});

renderScale('foundation');

document.getElementById('fontToggle').addEventListener('click', function(e) {
  var btn = e.target.closest('button');
  if (!btn) return;
  this.querySelectorAll('button').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  currentFont = btn.dataset.font;
  document.querySelectorAll('.scale-specimen').forEach(function(el) {
    el.style.fontFamily = fontMap[currentFont];
  });
});

function toggleDropdown(id) {
  document.querySelectorAll('.nav-dropdown').forEach(function(dd) {
    if (dd.id !== id) dd.classList.remove('open');
  });
  document.getElementById(id).classList.toggle('open');
}
document.addEventListener('click', function(e) {
  if (!e.target.closest('.nav-dropdown')) {
    document.querySelectorAll('.nav-dropdown').forEach(function(dd) { dd.classList.remove('open'); });
  }
});

var _pt = localStorage.getItem('prism-theme') || 'light';
document.querySelectorAll('.theme-toggle button').forEach(function(b) {
  b.classList.toggle('active', b.dataset.theme === _pt);
  b.addEventListener('click', function() {
    _pt = this.dataset.theme;
    document.documentElement.setAttribute('data-theme', _pt);
    localStorage.setItem('prism-theme', _pt);
    document.querySelectorAll('.theme-toggle button').forEach(function(b2) {
      b2.classList.toggle('active', b2.dataset.theme === _pt);
    });
  });
});
</script>
</body>
</html>
