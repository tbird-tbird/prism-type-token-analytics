<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Type Styles</title>
<style>
  :root { --bg: #fff; --border: #e5e5e5; --text: #1a1a1a; --muted: #6b7280; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
  .container { max-width: 1100px; margin: 0 auto; padding: 0 24px 48px; }
  nav.top-nav { border-bottom: 1px solid var(--border); margin-bottom: 40px; padding: 14px 0; display: flex; align-items: baseline; gap: 24px; font-size: 13px; position: relative; }
  nav.top-nav a { color: var(--muted); text-decoration: none; font-weight: 500; }
  nav.top-nav a:hover { color: var(--text); }
  nav.top-nav a.current { color: var(--text); }
  .nav-dropdown { position: relative; }
  .nav-dropdown-toggle { color: var(--muted); font-weight: 500; font-size: 13px; cursor: pointer; user-select: none; display: flex; align-items: center; gap: 4px; background: none; border: none; font-family: inherit; padding: 0; }
  .nav-dropdown-toggle:hover { color: var(--text); }
  .nav-dropdown-toggle.current { color: var(--text); }
  .nav-dropdown-toggle .caret { font-size: 10px; transition: transform 0.15s ease; }
  .nav-dropdown.open .caret { transform: rotate(180deg); }
  .nav-dropdown-menu { display: none; position: absolute; top: calc(100% + 8px); left: 0; background: #fff; border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,0.12); min-width: 160px; padding: 6px 0; z-index: 100; }
  .nav-dropdown.open .nav-dropdown-menu { display: block; }
  .nav-dropdown-menu a { display: block; padding: 8px 16px; color: var(--text); font-size: 14px; font-weight: 400; }
  .nav-dropdown-menu a:hover { background: #f9fafb; }
  .placeholder { display: flex; align-items: center; justify-content: center; height: 60vh; font-size: 16px; color: var(--muted); }
</style>
</head>
<body>
<div class="container">

<nav class="top-nav">
  <div class="nav-dropdown" id="tokensDropdown">
    <button class="nav-dropdown-toggle" onclick="toggleDropdown('tokensDropdown')">Tokens <span class="caret">&#9662;</span></button>
    <div class="nav-dropdown-menu">
      <a href="tokens-base.html">Base Tokens</a>
      <a href="tokens-usage.html">Usage Tokens</a>
    </div>
  </div>
  <div class="nav-dropdown" id="analyticsDropdown">
    <button class="nav-dropdown-toggle" onclick="toggleDropdown('analyticsDropdown')">Type Analytics <span class="caret">&#9662;</span></button>
    <div class="nav-dropdown-menu">
      <a href="index.html">Base Tokens</a>
      <a href="usage-tokens.html">Usage Tokens</a>
    </div>
  </div>
  <a href="token-proposal.html">Token Proposal</a>
  <a href="type-scale.html">Type Scale</a>
  <a href="type-styles.html" class="current">Type Styles</a>
</nav>

<div class="placeholder">In progress</div>

</div>
<script>
function toggleDropdown(id) {
  document.querySelectorAll('.nav-dropdown').forEach(function(dd) {
    if (dd.id !== id) dd.classList.remove('open');
  });
  document.getElementById(id).classList.toggle('open');
}
document.addEventListener('click', function(e) {
  if (!e.target.closest('.nav-dropdown')) {
    document.querySelectorAll('.nav-dropdown').forEach(function(dd) { dd.classList.remove('open'); });
  }
});
</script>
</body>
</html>
