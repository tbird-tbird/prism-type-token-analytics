<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Type Styles</title>
<style>
  :root { --bg: #fff; --border: #e5e5e5; --text: #1a1a1a; --muted: #6b7280; }
  [data-theme="dark"] { --bg: #0f0f0f; --border: #2a2a2a; --text: #e5e5e5; --muted: #888; --accent: #60a5fa; }
  [data-theme="dark"] .nav-dropdown-menu { background: #1a1a1a; box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
  [data-theme="dark"] .nav-dropdown-menu a:hover { background: #222; }
  [data-theme="dark"] td { border-bottom-color: #1e1e1e; }
  [data-theme="dark"] tr:hover td { background: #161616; }
  [data-theme="dark"] code { background: #1e1e1e; color: #ccc; }
  [data-theme="dark"] .note { background: #191400; border-left-color: #b45309; }
  [data-theme="dark"] .mode-tag { background: #1e1e1e; }
  [data-theme="dark"] .bar { background: #333; }
  [data-theme="dark"] .tier-1 { background: #1c0606; }
  [data-theme="dark"] .tier-2 { background: #191400; }
  [data-theme="dark"] .stat-card { background: #141414; border-color: var(--border); }
  [data-theme="dark"] .scale-toggle button { background: transparent; }
  [data-theme="dark"] .scale-toggle button.active { background: #e5e5e5; color: #0f0f0f; }
  [data-theme="dark"] .scale-toggle button:hover { background: #1a1a1a; }
  [data-theme="dark"] .scale-item { border-bottom-color: #1e1e1e; }
  [data-theme="dark"] .scale-item:hover { background: #161616; }
  [data-theme="dark"] .scale-flag { background: #2a0808; border-color: #7f1d1d; color: #f87171; }
  [data-theme="dark"] .scale-px.flagged { color: #f87171; }
  .theme-toggle { margin-left: auto; display: inline-flex; border: 1px solid var(--border); border-radius: 999px; padding: 3px; }
  .theme-toggle button { padding: 6px 16px; font-size: 13px; font-weight: 500; font-family: inherit; border: none; background: transparent; color: var(--muted); cursor: pointer; border-radius: 999px; transition: all 0.2s ease; }
  .theme-toggle button.active { background: var(--text); color: var(--bg); }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
  .container { max-width: 1100px; margin: 0 auto; padding: 0 24px 48px; }
  nav.top-nav { border-bottom: 1px solid var(--border); margin-bottom: 40px; padding: 14px 0; display: flex; align-items: baseline; gap: 24px; font-size: 13px; position: relative; }
  nav.top-nav a { color: var(--muted); text-decoration: none; font-weight: 500; }
  nav.top-nav a:hover { color: var(--text); }
  nav.top-nav a.current { color: var(--text); }
  .nav-dropdown { position: relative; }
  .nav-dropdown-toggle { color: var(--muted); font-weight: 500; font-size: 13px; cursor: pointer; user-select: none; display: flex; align-items: center; gap: 4px; background: none; border: none; font-family: inherit; padding: 0; }
  .nav-dropdown-toggle:hover { color: var(--text); }
  .nav-dropdown-toggle.current { color: var(--text); }
  .nav-dropdown-toggle .caret { font-size: 10px; transition: transform 0.15s ease; }
  .nav-dropdown.open .caret { transform: rotate(180deg); }
  .nav-dropdown-menu { display: none; position: absolute; top: calc(100% + 8px); left: 0; background: #fff; border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,0.12); min-width: 160px; padding: 6px 0; z-index: 100; }
  .nav-dropdown.open .nav-dropdown-menu { display: block; }
  .nav-dropdown-menu a { display: block; padding: 8px 16px; color: var(--text); font-size: 14px; font-weight: 400; }
  .nav-dropdown-menu a:hover { background: #f9fafb; }
  .placeholder { display: flex; align-items: center; justify-content: center; height: 60vh; font-size: 16px; color: var(--muted); }
</style>
<script>(function(){var t=localStorage.getItem("prism-theme")||"light";document.documentElement.setAttribute("data-theme",t)})()</script>
</head>
<body>
<div class="container">

<nav class="top-nav">
  <div class="nav-dropdown" id="tokensDropdown">
    <button class="nav-dropdown-toggle" onclick="toggleDropdown('tokensDropdown')">Token Inventory <span class="caret">&#9662;</span></button>
    <div class="nav-dropdown-menu">
      <a href="tokens-base.html">Base Tokens</a>
      <a href="tokens-usage.html">Usage Tokens</a>
    </div>
  </div>
  <div class="nav-dropdown" id="analyticsDropdown">
    <button class="nav-dropdown-toggle" onclick="toggleDropdown('analyticsDropdown')">Type Analytics <span class="caret">&#9662;</span></button>
    <div class="nav-dropdown-menu">
      <a href="index.html">Base Tokens</a>
      <a href="usage-tokens.html">Usage Tokens</a>
    </div>
  </div>
  <a href="token-proposal.html">Token Proposal</a>
  <a href="type-scale.html">Type Scale</a>
  <a href="type-styles.html" class="current">Type Styles</a>
  <div class="theme-toggle">
    <button data-theme="light">Light</button>
    <button data-theme="dark">Dark</button>
  </div>
</nav>

<div class="placeholder">In progress</div>

</div>
<script>
function toggleDropdown(id) {
  document.querySelectorAll('.nav-dropdown').forEach(function(dd) {
    if (dd.id !== id) dd.classList.remove('open');
  });
  document.getElementById(id).classList.toggle('open');
}
document.addEventListener('click', function(e) {
  if (!e.target.closest('.nav-dropdown')) {
    document.querySelectorAll('.nav-dropdown').forEach(function(dd) { dd.classList.remove('open'); });
  }
});

var _pt = localStorage.getItem('prism-theme') || 'light';
document.querySelectorAll('.theme-toggle button').forEach(function(b) {
  b.classList.toggle('active', b.dataset.theme === _pt);
  b.addEventListener('click', function() {
    _pt = this.dataset.theme;
    document.documentElement.setAttribute('data-theme', _pt);
    localStorage.setItem('prism-theme', _pt);
    document.querySelectorAll('.theme-toggle button').forEach(function(b2) {
      b2.classList.toggle('active', b2.dataset.theme === _pt);
    });
  });
});
</script>
</body>
</html>
